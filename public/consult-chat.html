<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在线客服 - 浙江良巧匠网络科技</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #F5F7FA; height: 100vh; display: flex; }
    
    /* 侧边栏 */
    .sidebar { width: 280px; background: #fff; border-right: 1px solid #E8E8E8; display: flex; flex-direction: column; }
    .sidebar-header { padding: 16px 20px; border-bottom: 1px solid #E8E8E8; }
    .sidebar-title { font-size: 18px; font-weight: 600; color: #1F1F1F; }
    .sidebar-subtitle { font-size: 12px; color: #8C8C8C; margin-top: 4px; }
    
    .service-list { flex: 1; overflow-y: auto; padding: 8px; }
    .service-item { padding: 12px 16px; border-radius: 12px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
    .service-item:hover { background: #F5F7FA; }
    .service-item.active { background: #E6F4FF; }
    .service-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; }
    .service-blue { background: linear-gradient(135deg, #1677FF, #4096FF); color: #fff; }
    .service-dark { background: linear-gradient(135deg, #0F52BA, #1E90FF); color: #fff; }
    .service-orange { background: linear-gradient(135deg, #FA8C16, #FFA940); color: #fff; }
    .service-info { flex: 1; min-width: 0; }
    .service-name { font-size: 14px; font-weight: 600; color: #1F1F1F; }
    .service-desc { font-size: 12px; color: #8C8C8C; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .service-status { width: 8px; height: 8px; border-radius: 50%; background: #52C41A; }
    
    .sidebar-footer { padding: 12px 20px; border-top: 1px solid #E8E8E8; }
    .footer-tip { font-size: 12px; color: #8C8C8C; text-align: center; }
    
    /* 聊天区域 */
    .chat-area { flex: 1; display: flex; flex-direction: column; background: #F5F7FA; }
    .chat-header { padding: 16px 24px; background: #fff; border-bottom: 1px solid #E8E8E8; display: flex; align-items: center; justify-content: space-between; }
    .chat-header-left { display: flex; align-items: center; gap: 12px; }
    .chat-avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; }
    .chat-name { font-size: 16px; font-weight: 600; color: #1F1F1F; }
    .chat-status { font-size: 12px; color: #52C41A; display: flex; align-items: center; gap: 4px; margin-top: 2px; }
    .chat-status-dot { width: 6px; height: 6px; border-radius: 50%; background: #52C41A; }
    .chat-close { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s; }
    .chat-close:hover { background: #F5F7FA; }
    .chat-close svg { width: 16px; height: 16px; color: #8C8C8C; }
    
    .chat-messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .message { display: flex; gap: 12px; }
    .message.agent { justify-content: flex-start; }
    .message.user { justify-content: flex-end; }
    .message-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; flex-shrink: 0; }
    .message-content { max-width: 60%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.6; }
    .message.agent .message-content { background: #fff; border: 1px solid #E8E8E8; border-radius: 0 16px 16px 16px; color: #1F1F1F; }
    .message.user .message-content { background: linear-gradient(135deg, #1677FF, #4096FF); color: #fff; border-radius: 16px 0 16px 16px; }
    .message-time { font-size: 11px; color: #BBBBBB; margin-top: 4px; }
    .message.agent .message-time { text-align: left; }
    .message.user .message-time { text-align: right; }
    
    .chat-input-area { padding: 16px 24px; background: #fff; border-top: 1px solid #E8E8E8; }
    .input-wrapper { display: flex; align-items: center; gap: 12px; background: #F5F7FA; border-radius: 24px; padding: 8px 16px; }
    .input-btn { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s; }
    .input-btn:hover { background: #E8E8E8; }
    .input-btn svg { width: 18px; height: 18px; color: #8C8C8C; }
    .chat-input { flex: 1; border: none; background: transparent; font-size: 14px; outline: none; padding: 8px 0; }
    .chat-input::placeholder { color: #BBBBBB; }
    .send-btn { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #1677FF, #4096FF); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
    .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 12px rgba(22,119,255,0.3); }
    .send-btn svg { width: 16px; height: 16px; color: #fff; }
    
    /* 欢迎卡片 */
    .welcome-card { background: linear-gradient(135deg, #1677FF, #4096FF); border-radius: 20px; padding: 32px; color: #fff; margin-bottom: 16px; }
    .welcome-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .welcome-desc { font-size: 14px; opacity: 0.9; margin-bottom: 20px; line-height: 1.6; }
    .quick-questions { display: flex; flex-wrap: wrap; gap: 8px; }
    .quick-btn { padding: 8px 16px; background: rgba(255,255,255,0.2); border-radius: 20px; font-size: 13px; cursor: pointer; transition: background 0.2s; }
    .quick-btn:hover { background: rgba(255,255,255,0.3); }
    
    /* 移动端适配 */
    @media (max-width: 768px) {
      .sidebar { width: 0; overflow: hidden; }
      .chat-messages { padding: 16px; }
      .message-content { max-width: 75%; }
    }
  </style>
</head>
<body>

  <!-- 侧边栏 -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">在线客服</div>
      <div class="sidebar-subtitle">选择您需要咨询的服务</div>
    </div>
    
    <div class="service-list">
      <div class="service-item active">
        <div class="service-avatar service-blue">约</div>
        <div class="service-info">
          <div class="service-name">民匠有约客服</div>
          <div class="service-desc">灵活用工、结算方案咨询</div>
        </div>
        <div class="service-status"></div>
      </div>
      <div class="service-item">
        <div class="service-avatar service-dark">云</div>
        <div class="service-info">
          <div class="service-name">安心云客服</div>
          <div class="service-desc">企业管理、系统对接咨询</div>
        </div>
        <div class="service-status"></div>
      </div>
      <div class="service-item">
        <div class="service-avatar service-orange">代</div>
        <div class="service-info">
          <div class="service-name">代理合作咨询</div>
          <div class="service-desc">城市代理、合作政策咨询</div>
        </div>
        <div class="service-status"></div>
      </div>
    </div>
    
    <div class="sidebar-footer">
      <div class="footer-tip">客服工作时间：工作日 9:00-18:00</div>
    </div>
  </div>

  <!-- 聊天区域 -->
  <div class="chat-area">
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="chat-avatar service-blue">约</div>
        <div>
          <div class="chat-name">民匠有约客服</div>
          <div class="chat-status"><span class="chat-status-dot"></span>在线</div>
        </div>
      </div>
      <div class="chat-close" onclick="window.location.href='index.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
    </div>
    
    <div class="chat-messages" id="chatMessages">
      <div class="welcome-card">
        <div class="welcome-title">您好！欢迎咨询民匠有约</div>
        <div class="welcome-desc">我是您的专属客服，很高兴为您服务。您可以咨询关于灵活用工、结算方案、合同签署等相关问题。</div>
        <div class="quick-questions">
          <div class="quick-btn" onclick="sendMessage('如何注册成为企业用户？')">如何注册成为企业用户？</div>
          <div class="quick-btn" onclick="sendMessage('福运宝和如意宝有什么区别？')">福运宝和如意宝有什么区别？</div>
          <div class="quick-btn" onclick="sendMessage('结算周期是多久？')">结算周期是多久？</div>
          <div class="quick-btn" onclick="sendMessage('如何签署电子合同？')">如何签署电子合同？</div>
        </div>
      </div>
      
      <div class="message agent">
        <div class="message-avatar service-blue">约</div>
        <div>
          <div class="message-content">您好！请问有什么可以帮您的？</div>
          <div class="message-time">刚刚</div>
        </div>
      </div>
    </div>
    
    <div class="chat-input-area">
      <div class="input-wrapper">
        <div class="input-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </div>
        <input type="text" class="chat-input" id="chatInput" placeholder="输入您的问题..." onkeypress="handleKeyPress(event)">
        <div class="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </div>
      </div>
    </div>
  </div>

  <script>
    var chatMessages = document.getElementById('chatMessages');
    var chatInput = document.getElementById('chatInput');
    
    function sendMessage(text) {
      var messageText = text || chatInput.value.trim();
      if (!messageText) return;
      
      chatInput.value = '';
      
      // 用户消息
      var userMsg = document.createElement('div');
      userMsg.className = 'message user';
      userMsg.innerHTML = '<div class="message-avatar" style="background:#F0F0F0;color:#8C8C8C;">我</div><div><div class="message-content">' + messageText + '</div><div class="message-time">刚刚</div></div>';
      chatMessages.appendChild(userMsg);
      
      // 滚动到底部
      chatMessages.scrollTop = chatMessages.scrollHeight;
      
      // 模拟回复
      setTimeout(function() {
        var replies = [
          '感谢您的咨询！关于这个问题，我需要帮您查询一下详细信息，请稍等。',
          '好的，我来为您解答。' + messageText + '相关的内容如下：',
          '您的问题我已经记录下来了，我们会尽快安排专业人员与您联系。',
          '很高兴为您服务！' + messageText + '是我们的核心业务之一，您可以在官网了解更多详情。',
          '请问您还有其他问题需要咨询吗？'
        ];
        var randomReply = replies[Math.floor(Math.random() * replies.length)];
        
        var agentMsg = document.createElement('div');
        agentMsg.className = 'message agent';
        agentMsg.innerHTML = '<div class="message-avatar service-blue">约</div><div><div class="message-content">' + randomReply + '</div><div class="message-time">刚刚</div></div>';
        chatMessages.appendChild(agentMsg);
        
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }, 1000);
    }
    
    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        sendMessage();
      }
    }
  </script>
</body>
</html>
