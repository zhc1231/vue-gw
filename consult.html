<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在线咨询 - 浙江良巧匠网络科技</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: linear-gradient(135deg, #1677FF, #4096FF); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .consult-container { background: #fff; border-radius: 24px; padding: 48px; max-width: 480px; width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(22,119,255,0.3); }
    .consult-icon { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #1677FF, #4096FF); display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
    .consult-icon svg { width: 40px; height: 40px; color: #fff; }
    .consult-title { font-size: 24px; font-weight: 700; color: #1F1F1F; margin-bottom: 12px; }
    .consult-desc { font-size: 15px; color: #8C8C8C; margin-bottom: 32px; line-height: 1.6; }
    .consult-card { background: #F8FAFC; border-radius: 16px; padding: 24px; margin-bottom: 16px; text-align: left; }
    .consult-card:last-child { margin-bottom: 0; }
    .consult-card-title { font-size: 16px; font-weight: 600; color: #1F1F1F; margin-bottom: 8px; }
    .consult-card-desc { font-size: 13px; color: #8C8C8C; margin-bottom: 16px; }
    .consult-card-btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 24px; background: linear-gradient(135deg, #1677FF, #4096FF); color: #fff; border-radius: 100px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
    .consult-card-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(22,119,255,0.3); }
    .consult-card-btn svg { width: 16px; height: 16px; }
    .consult-back { margin-top: 32px; font-size: 13px; color: #8C8C8C; }
    .consult-back a { color: #1677FF; text-decoration: none; }
    .consult-back a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="consult-container">
    <div class="consult-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
      </svg>
    </div>

    <h1 class="consult-title">在线咨询服务</h1>
    <p class="consult-desc">选择您需要咨询的服务类型，我们的专业顾问将为您提供一对一服务</p>

    <div class="consult-card">
      <div class="consult-card-title">民匠有约 - 灵活用工咨询</div>
      <div class="consult-card-desc">企业用工方案、结算方案、合同签署、保险保障等相关咨询</div>
      <div class="consult-card-btn" onclick="window.location.href='consult-chat.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        立即咨询
      </div>
    </div>

    <div class="consult-card">
      <div class="consult-card-title">民匠安心云 - 企业管理咨询</div>
      <div class="consult-card-desc">审批流程、考勤管理、组织架构、系统对接等相关咨询</div>
      <div class="consult-card-btn" onclick="window.location.href='consult-chat.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        立即咨询
      </div>
    </div>

    <div class="consult-card">
      <div class="consult-card-title">城市代理合伙人咨询</div>
      <div class="consult-card-desc">区域代理、流水分成、培训支持、合作政策等相关咨询</div>
      <div class="consult-card-btn" onclick="window.location.href='consult-chat.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        立即咨询
      </div>
    </div>

    <div class="consult-back">
      <a href="index.html">← 返回首页</a>
    </div>
  </div>

</body>
</html>
